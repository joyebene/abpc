<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANDREA BOCELLI POLAND CONCERT</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            width: 100%;
            max-width: 600px;
        }

        h1 {
            text-align: center;
            color: #333;
            font-weight: 700;
            margin-bottom: 10px;
        }

        h2 {
            text-align: center;
            color: #555;
            font-weight: 500;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            background-color: #f9f9f9;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #6a11cb;
            box-shadow: 0 0 0 3px rgba(106, 17, 203, 0.2);
        }

        .form-group input[type="submit"] {
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1px;
            padding: 15px;
        }

        .form-group input[type="submit"]:hover {
            opacity: 0.9;
        }

        .info {
            background-color: rgba(106, 17, 203, 0.1);
            border-left: 6px solid #6a11cb;
            padding: 15px;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        .info p {
            margin: 5px 0;
        }

        #ticket {
            margin-top: 20px;
            text-align: center;
        }

        #barcode {
            display: block;
            margin: 20px auto;
            max-width: 100%;
            height: auto;
        }

        .logo {
            display: block;
            margin: 0 auto 20px;
            max-width: 100%;
            max-height: 120px;
            width: auto;
            height: auto;
        }

        .form-row {
            display: flex;
            gap: 20px;
        }

        .form-row .form-group {
            flex: 1;
        }

        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 20px;
            }

            .form-row {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
</head>

<body>
    <div class="container" id="registrationContainer">8
        <img src="logo.jpeg" alt="Concert Logo" class="logo">
        <h1>ANDREA BOCELLI POLAND CONCERT</h1>

        <form id="registrationForm">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="phone">Phone Number:</label>
                    <input type="tel" id="phone" name="phone">
                </div>
                <div class="form-group">
                    <label for="gender">Gender:</label>
                    <select id="gender" name="gender">
                        <option value="">Please select</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="country">Country:</label>
                <input type="text" id="country" name="country" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="fanSince">How long have you been a fan?</label>
                    <input type="text" id="fanSince" name="fanSince" required>
                </div>
                <div class="form-group">
                    <label for="membership">Membership Card No:</label>
                    <input type="text" id="membership" name="membership">
                </div>
            </div>

            <div class="form-group">
                <label for="address">Home/Hotel:</label>
                <input type="text" id="address" name="address" required>
            </div>

            <div class="info">
                <p><strong>Date:</strong> August 14, 2026</p>
                <p><strong>Time:</strong> 8:00 PM</p>
                <p><strong>Venue:</strong> Polsat Plus Arena, Gdańsk, Poland 🇵🇱</p>
            </div>

            <div class="form-group">
                <input type="submit" value="Generate Ticket">
            </div>
        </form>
    </div>

    <div class="container" id="ticketContainer" style="display: none;">
        <img src="logo.jpeg" alt="Concert Logo" class="logo">
        <h1>ANDREA BOCELLI POLAND CONCERT</h1>
        <h2>Your Ticket</h2>
        <div class="info">
            <p><strong>Date:</strong> August 14, 2026</p>
            <p><strong>Time:</strong> 8:00 PM</p>
            <p><strong>Venue:</strong> Polsat Plus Arena, Gdańsk, Poland 🇵🇱</p>
        </div>
        <div id="ticket">
            <p><strong>Ticket ID:</strong> <span id="ticketId"></span></p>
            <svg id="barcode"></svg>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script>
        document.getElementById('registrationForm').addEventListener('submit', function (event) {
            event.preventDefault();

            // Generate a unique ticket ID
            const ticketId = 'BOCELLI-' + Math.random().toString(36).substr(2, 9).toUpperCase();

            // Display the ticket ID
            document.getElementById('ticketId').innerText = ticketId;

            // Generate barcode
            JsBarcode("#barcode", ticketId, {
                format: "CODE128",
                lineColor: "#000",
                width: 2,
                height: 40,
                displayValue: true
            });

            // Hide the form and show the ticket
            document.getElementById('registrationContainer').style.display = 'none';
            document.getElementById('ticketContainer').style.display = 'block';
        });
    </script>
</body>

</html>
